<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MetaPelet — Поговорить</title>
  <style>
    body { font-family: system-ui, Arial, sans-serif; max-width: 720px; margin: 28px auto; padding: 0 16px; }
    h1 { margin: 0 0 8px; }
    .card { border: 1px solid #ddd; border-radius: 14px; padding: 16px; margin-top: 14px; }
    button { padding: 12px 14px; border-radius: 12px; border: 1px solid #ccc; cursor: pointer; }
    button.primary { font-weight: 600; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .muted { color:#666; font-size: 14px; }
    textarea { width: 100%; min-height: 90px; border-radius: 12px; border:1px solid #ccc; padding: 10px; }
    .status { margin-top: 10px; font-size: 14px; }
    .ok { color: #0a7; }
    .bad { color: #c20; }
  </style>
</head>
<body>
  <h1>MetaPelet</h1>
  <p id="username"></p>
  <div class="muted">Нажми «🎙 Поговорить», и скажи что-нибудь.</div>

  <div class="card">
    <div class="row">
      <button class="primary" id="btnRec">🎙 Поговорить</button>
      
    </div>

    <div class="status" id="status">Статус: готово</div>

    <h3>Ты сказала:</h3>
    <textarea id="userText" placeholder="Текст появится тут..."></textarea>

    <h3>MetaPelet ответила:</h3>
    <textarea id="botText" placeholder="Ответ появится тут..." readonly></textarea>

    <div class="row" style="margin-top:10px;">
      <button id="btnSpeak" disabled>🔊 Озвучить ответ</button>
     
    </div>
  </div>

<script>
const API_KEY = "AIzaSyDMUowDSO4zjvd2GOJ79_GqDTOSb9eFTMg";
const BACKEND_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + API_KEY;

const statusEl = document.getElementById("status");
const userTextEl = document.getElementById("userText");
const botTextEl = document.getElementById("botText");
const btnSpeak = document.getElementById("btnSpeak");
const params = new URLSearchParams(window.location.search);
const userId = params.get("id");
function setStatus(text) {
  statusEl.innerText = "Статус: " + text;
}
console.log("userId from URL:", userId);
const SpeechRecognition =
  window.SpeechRecognition || window.webkitSpeechRecognition;

let rec = new SpeechRecognition();

rec.lang = "ru-RU";
rec.interimResults = false;
rec.continuous = false;

rec.onstart = () => {
  setStatus("Слушаю...");
  userTextEl.value = "";
};

rec.onresult = async (event) => {
  const text = event.results[0][0].transcript;
  userTextEl.value = text;

  setStatus("Отправляю...");

  try {
    const r = await fetch(BACKEND_URL + "/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({ text }),
    });

    const data = await r.json();

    const reply = data.reply || "Я рядом.";

    botTextEl.value = reply;

    const u = new SpeechSynthesisUtterance(reply);
    u.lang = "ru-RU";

    speechSynthesis.cancel();
    speechSynthesis.speak(u);

    setStatus("Готово");

  } catch (e) {
    setStatus("Ошибка сервера");
  }
};

rec.onerror = () => {
  setStatus("Ошибка микрофона");
};

document.body.onclick = () => {
  rec.start();
};
</script>
</body>
</html>
